version: 2

project_name: everything

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    formats: ["tar.gz"]
    format_overrides:
      - goos: windows
        formats: ["zip"]

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

brews:
  - name: everything
    repository:
      owner: Hxmbl
      name: homebrew-everything
    commit_author:
      name: hxmbl
      email: hxmbl@users.noreply.github.com
    homepage: https://github.com/Hxmbl/everything
    description: Dump your entire project into a single file. Mostly for feeding code to LLMs.
    license: MIT
    test: |
      system "#{bin}/everything --version"
    skip_upload: auto
